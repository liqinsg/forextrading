- name: Prepare Monitoring Environment
  hosts: localhost
  gather_facts: false
  tasks:    
    - name: Ensure Python is installed
      ansible.builtin.package:
        name: python3
        state: present

    - name: Ensure pip is installed
      ansible.builtin.package:
        name: python3-pip
        state: present

    - name: Install required Python packages
      ansible.builtin.pip:
        name:
          - requests
          - pydantic
          - google-genai
    
    - name: yahoo finance api
      ansible.builtin.pip:
        name:
          - yfinance
        state: present
      